<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>เข้าสู่ระบบ | ระบบขออนุมัติ โรงเรียนสุรวิทยาคาร</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      :root {
        --deep-green: #062f24;
        --deep-green-2: #0b4a35;
        --glass: rgba(255, 255, 255, 0.15);
        --glass-strong: rgba(255, 255, 255, 0.22);
        --gold: #d8ad3d;
        --gold-light: #f2d37b;
        --text: #f7fff9;
        --muted: rgba(247, 255, 249, 0.74);
        --danger: #ffcfcc;
        --shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        font-family: "TH Sarabun New", "TH SarabunPSK", "Sarabun", "Noto Sans Thai", sans-serif;
        font-size: 21px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "TH Sarabun New", "TH SarabunPSK", "Sarabun", "Noto Sans Thai", sans-serif;
        background:
          radial-gradient(circle at 15% 18%, rgba(216, 173, 61, 0.24), transparent 28rem),
          radial-gradient(circle at 82% 78%, rgba(22, 135, 90, 0.5), transparent 34rem),
          linear-gradient(135deg, #041c16 0%, var(--deep-green) 48%, #0c3f31 100%);
        overflow-x: hidden;
      }

      button {
        font: inherit;
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 1.25rem;
      }

      .page::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), transparent 82%);
      }

      .glass-card {
        width: min(30rem, 100%);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 2rem;
        padding: 2rem;
        background: var(--glass);
        box-shadow: var(--shadow);
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
      }

      .login-card {
        display: grid;
        justify-items: center;
        text-align: center;
      }

      .school-mark {
        display: grid;
        width: 4.5rem;
        height: 4.5rem;
        margin-bottom: 1rem;
        place-items: center;
        border: 1px solid rgba(242, 211, 123, 0.7);
        border-radius: 1.35rem;
        color: #163323;
        background: linear-gradient(135deg, var(--gold-light), var(--gold));
        box-shadow: 0 16px 38px rgba(216, 173, 61, 0.28);
        font-size: 1.75rem;
        font-weight: 800;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 5vw, 2.35rem);
        line-height: 1.05;
      }

      .subtitle {
        margin-top: 0.55rem;
        color: var(--muted);
        font-size: 1.12rem;
        line-height: 1.35;
      }

      .google-wrap {
        display: grid;
        min-height: 3rem;
        margin-top: 1.55rem;
        place-items: center;
      }

      .status-text {
        min-height: 1.45rem;
        margin-top: 1rem;
        color: var(--gold-light);
        font-size: 1rem;
      }

      .app-card {
        display: none;
      }

      .app-card.active {
        display: block;
      }

      .profile-header {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .avatar {
        flex: 0 0 auto;
        width: 4rem;
        height: 4rem;
        border: 2px solid rgba(242, 211, 123, 0.8);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        object-fit: cover;
      }

      .eyebrow {
        color: var(--gold-light);
        font-size: 1rem;
        font-weight: 700;
      }

      .greeting {
        margin-top: 0.25rem;
        font-size: clamp(1.45rem, 4vw, 2rem);
        line-height: 1.1;
      }

      .profile-details {
        display: grid;
        gap: 0.65rem;
        margin-top: 1.35rem;
      }

      .detail-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        border-radius: 1rem;
        padding: 0.7rem 0.85rem;
        background: var(--glass-strong);
      }

      .detail-row span {
        color: var(--muted);
      }

      .detail-row strong {
        text-align: right;
      }

      .gold-button {
        width: 100%;
        min-height: 2.85rem;
        margin-top: 1.35rem;
        border: 0;
        border-radius: 999px;
        color: #143222;
        background: linear-gradient(135deg, var(--gold-light), var(--gold));
        box-shadow: 0 18px 36px rgba(216, 173, 61, 0.24);
        cursor: pointer;
        font-size: 1.08rem;
        font-weight: 800;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 560px) {
        :root {
          font-size: 20px;
        }

        .glass-card {
          padding: 1.35rem;
          border-radius: 1.55rem;
        }

        .profile-header {
          align-items: flex-start;
        }

        .detail-row {
          align-items: flex-start;
          flex-direction: column;
          gap: 0.15rem;
        }

        .detail-row strong {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section id="loginState" class="glass-card login-card" aria-labelledby="loginTitle">
        <div class="school-mark" aria-hidden="true">สว</div>
        <h1 id="loginTitle">ระบบขออนุมัติ โรงเรียนสุรวิทยาคาร</h1>
        <p class="subtitle">จัดซื้อ จัดจ้าง และไปราชการ</p>
        <div class="google-wrap">
          <div id="googleSignInButton"></div>
        </div>
        <p id="loginStatus" class="status-text" aria-live="polite"></p>
      </section>

      <section id="appState" class="glass-card app-card" aria-labelledby="greetingText">
        <div class="profile-header">
          <img id="profileImage" class="avatar" alt="" />
          <div>
            <p class="eyebrow">เข้าสู่ระบบสำเร็จ</p>
            <h2 id="greetingText" class="greeting">สวัสดี</h2>
          </div>
        </div>

        <div class="profile-details">
          <div class="detail-row">
            <span>อีเมล</span>
            <strong id="profileEmail">-</strong>
          </div>
          <div class="detail-row">
            <span>ฝ่าย/กลุ่มงาน</span>
            <strong id="profileDepartment">-</strong>
          </div>
          <div class="detail-row">
            <span>สิทธิ์การใช้งาน</span>
            <strong id="profileRole">-</strong>
          </div>
        </div>

        <button id="signOutButton" class="gold-button" type="button">ออกจากระบบ</button>
      </section>
    </main>

    <script>
      // TODO: เปลี่ยนเป็น Client ID จาก Google Cloud Console
      const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

      // TODO: เปลี่ยนเป็น URL หลัง Deploy Google Apps Script Web App
      const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";

      const loginState = document.getElementById("loginState");
      const appState = document.getElementById("appState");
      const loginStatus = document.getElementById("loginStatus");

      window.addEventListener("load", initGoogleLogin);
      document.getElementById("signOutButton").addEventListener("click", signOut);

      /**
       * เตรียมปุ่ม Sign in with Google ด้วย Google Identity Services
       */
      function initGoogleLogin() {
        if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith("YOUR_")) {
          setLoginStatus("กรุณาตั้งค่า GOOGLE_CLIENT_ID ก่อนใช้งาน");
          return;
        }

        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
          setLoginStatus("กำลังโหลด Google Login...");
          window.setTimeout(initGoogleLogin, 250);
          return;
        }

        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleCredentialResponse,
        });

        google.accounts.id.renderButton(document.getElementById("googleSignInButton"), {
          type: "standard",
          theme: "filled_blue",
          size: "large",
          shape: "pill",
          text: "signin_with",
          locale: "th",
        });

        setLoginStatus("");
      }

      /**
       * ทำงานหลัง Login สำเร็จ:
       * 1. Decode ID token เพื่อดึง email
       * 2. เรียก Apps Script doGet ด้วย action=getUserProfile
       * 3. ตรวจ role และแสดงหน้าหลักเมื่อมีสิทธิ์
       */
      async function handleCredentialResponse(response) {
        try {
          setLoginStatus("กำลังตรวจสอบสิทธิ์...");

          const googleProfile = decodeJwt(response.credential);
          const email = googleProfile.email;
          const userProfile = await fetchUserProfile(email);

          if (!userProfile || userProfile.role === "GUEST") {
            alert("ไม่มีสิทธิ์เข้าใช้งานระบบ กรุณาติดต่อผู้ดูแลระบบ");
            signOut();
            return;
          }

          showAppState(userProfile, googleProfile);
        } catch (error) {
          console.error(error);
          alert("ไม่สามารถเข้าสู่ระบบได้: " + (error.message || error));
          signOut();
        }
      }

      /**
       * เรียก Apps Script API เพื่อดึงข้อมูลผู้ใช้จากชีต UserRoles
       *
       * Apps Script doGet จะรับ:
       * action=getUserProfile
       * email=อีเมลผู้ใช้
       */
      async function fetchUserProfile(email) {
        if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.startsWith("YOUR_")) {
          throw new Error("กรุณาตั้งค่า APPS_SCRIPT_URL ก่อนใช้งาน");
        }

        const url = new URL(APPS_SCRIPT_URL);
        url.searchParams.set("action", "getUserProfile");
        url.searchParams.set("email", email);

        const response = await fetch(url.toString(), {
          method: "GET",
          mode: "cors",
        });

        if (!response.ok) {
          throw new Error("Apps Script API ตอบกลับไม่สำเร็จ");
        }

        const result = await response.json();

        if (!result.ok) {
          throw new Error(result.error || "ไม่สามารถดึงข้อมูลผู้ใช้ได้");
        }

        return result.data;
      }

      /**
       * แสดง State 2 หลังผ่านสิทธิ์เรียบร้อย
       */
      function showAppState(userProfile, googleProfile) {
        const name = userProfile.name || googleProfile.name || userProfile.email;
        const position = userProfile.position || "-";

        document.getElementById("profileImage").src = googleProfile.picture || "";
        document.getElementById("greetingText").textContent = `สวัสดี ${name} (${position})`;
        document.getElementById("profileEmail").textContent = userProfile.email || "-";
        document.getElementById("profileDepartment").textContent = userProfile.department || "-";
        document.getElementById("profileRole").textContent = userProfile.role || "-";

        loginState.classList.add("hidden");
        appState.classList.add("active");
      }

      /**
       * ออกจากระบบและกลับไปหน้า Login
       */
      function signOut() {
        google.accounts.id.disableAutoSelect();
        appState.classList.remove("active");
        loginState.classList.remove("hidden");
        setLoginStatus("");
      }

      /**
       * Decode Google ID token เพื่ออ่านข้อมูลพื้นฐาน เช่น email, name, picture
       */
      function decodeJwt(token) {
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        const jsonPayload = decodeURIComponent(
          atob(base64)
            .split("")
            .map((char) => "%" + ("00" + char.charCodeAt(0).toString(16)).slice(-2))
            .join(""),
        );

        return JSON.parse(jsonPayload);
      }

      function setLoginStatus(message) {
        loginStatus.textContent = message;
      }
    </script>
  </body>
</html>
